<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Sophē Design Studio</title>
<style>
  @font-face {
    font-family: 'Switzer';
    src: url('Switzer-Regular.woff2') format('woff2');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Switzer';
    src: url('Switzer-Medium.woff2') format('woff2');
    font-weight: 500; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Switzer';
    src: url('Switzer-Bold.woff2') format('woff2');
    font-weight: 700; font-style: normal; font-display: swap;
  }

  :root {
    --ink: #1A1A1A;
    --bone: #EDE8DD;
    --clay: #C04A2B;
    --line: rgba(237,232,221,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--ink);
    color: var(--bone);
    font-family: 'Switzer', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    position: relative;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Esquinitas técnicas */
  body::before {
    content: '';
    position: absolute;
    top: 32px; left: 32px;
    width: 24px; height: 24px;
    border-top: 1px solid var(--line);
    border-left: 1px solid var(--line);
  }
  body::after {
    content: '';
    position: absolute;
    bottom: 32px; right: 32px;
    width: 24px; height: 24px;
    border-bottom: 1px solid var(--line);
    border-right: 1px solid var(--line);
  }

  .corner {
    position: absolute;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 700;
    color: rgba(237,232,221,0.4);
  }
  .corner.tl { top: 36px; left: 60px; }
  .corner.br { bottom: 36px; right: 60px; text-align: right; }

  .content {
    text-align: center;
    max-width: 520px;
    z-index: 1;
  }

  .num-block {
    font-weight: 500;
    font-size: clamp(96px, 22vw, 220px);
    line-height: 0.85;
    letter-spacing: -0.06em;
    margin-bottom: 32px;
    position: relative;
    display: inline-block;
  }
  .num-block .zero {
    font-weight: 700;
    color: var(--clay);
  }
  /* Macron above the 0, mimicking the logo signature */
  .num-block .zero::before {
    content: '';
    position: absolute;
    top: 0.05em;
    left: 50%;
    transform: translateX(-50%);
    width: 0.45em;
    height: 0.04em;
    background: var(--clay);
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--clay);
    font-weight: 700;
    margin-bottom: 24px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--clay);
  }

  .message {
    font-weight: 500;
    font-size: clamp(28px, 5vw, 44px);
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  .message em {
    font-style: normal;
    font-weight: 700;
    color: var(--clay);
  }

  .sub {
    font-size: 15px;
    color: rgba(237,232,221,0.6);
    margin-bottom: 40px;
    line-height: 1.6;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--clay);
    color: var(--bone);
    text-decoration: none;
    padding: 18px 32px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
    transition: background 0.3s;
  }
  .back-btn:hover { background: #A53D22; }
  .back-btn .arr { transition: transform 0.3s; }
  .back-btn:hover .arr { transform: translateX(-4px); }

  /* Logo bottom */
  .footer-logo {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
  }
  .footer-logo svg { display: block; }

  @media (max-width: 600px) {
    body::before, body::after, .corner { display: none; }
    .footer-logo { display: none; }
  }
</style>
</head>
<body>

  <span class="corner tl">SOPHĒ ✦ DESIGN STUDIO</span>
  <span class="corner br">ERR · 404</span>

  <div class="content">
    <div class="num-block">4<span class="zero">0</span>4</div>
    <div class="eyebrow">Página no encontrada</div>
    <h1 class="message">Esta página <em>no existe</em>.</h1>
    <p class="sub">Te perdiste. Pero las marcas que envejecen bien — sí siguen acá.</p>
    <a href="/" class="back-btn">
      <span class="arr">←</span>
      Volver al inicio
    </a>
  </div>

  <a href="/" class="footer-logo">
    <svg width="80" height="22" viewBox="0 0 540 160" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="130" font-family="Switzer, sans-serif" font-weight="500" font-size="160" fill="#EDE8DD" letter-spacing="-7">sophē</text>
      <rect x="430" y="32" width="78" height="6" fill="#C04A2B"/>
    </svg>
  </a>

</body>
</html>
