<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Sophē Design Studio</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --warm-black: #2c2926;
    --cream: #f5f0eb;
    --terracotta: #c4856a;
    --muted-gold: #b8a088;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--warm-black);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(196,133,106,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 60%, rgba(138,154,123,0.04) 0%, transparent 50%);
  }
  .ghost-text {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: min(50vw, 400px);
    color: rgba(245,240,235,0.02);
    pointer-events: none;
    user-select: none;
  }
  .content {
    position: relative;
    z-index: 1;
    animation: fadeUp 1s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .error-code {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(80px, 20vw, 160px);
    letter-spacing: 8px;
    line-height: 1;
    margin-bottom: 8px;
    color: var(--cream);
  }
  .error-code span {
    font-style: italic;
    color: var(--terracotta);
  }
  .divider {
    width: 50px;
    height: 1px;
    background: var(--terracotta);
    margin: 24px auto;
    position: relative;
  }
  .divider::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 6px; height: 6px;
    background: var(--terracotta);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .message {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(20px, 4vw, 32px);
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .message em {
    font-style: italic;
    color: var(--terracotta);
  }
  .sub {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 14px;
    color: var(--muted-gold);
    margin-bottom: 40px;
  }
  .back-btn {
    display: inline-block;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--cream);
    text-decoration: none;
    padding: 14px 40px;
    border: 1px solid rgba(184,160,136,0.3);
    transition: all 0.4s;
    position: relative;
    overflow: hidden;
  }
  .back-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--terracotta);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s;
    z-index: -1;
  }
  .back-btn:hover { border-color: var(--terracotta); }
  .back-btn:hover::before { transform: scaleX(1); }
  .logo {
    position: absolute;
    top: 32px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 18px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--cream);
    text-decoration: none;
    z-index: 2;
  }
  .logo .accent { font-style: italic; font-weight: 400; }
</style>
</head>
<body>
  <div class="ghost-text">404</div>
  <a href="/" class="logo">SOPH<span class="accent">Ē</span></a>
  <div class="content">
    <div class="error-code">4<span>0</span>4</div>
    <div class="divider"></div>
    <div class="message">Esta página no <em>existe</em></div>
    <div class="sub">Parece que te perdiste, pero no te preocupes.</div>
    <a href="/" class="back-btn">Volver al inicio</a>
  </div>
</body>
</html>
